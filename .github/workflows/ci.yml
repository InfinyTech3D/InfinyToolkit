name: CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  build-and-test:
    name: Run on ${{ matrix.os }} with SOFA ${{ matrix.sofa_branch }}
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'pr: status to review')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        sofa_branch: [master]

    steps:
      - name: Setup SOFA and environment
        id: sofa
        uses: sofa-framework/sofa-setup-action@v5
        with:
          sofa_root: ${{ github.workspace }}/sofa
          sofa_version: ${{ matrix.sofa_branch }}
          sofa_scope: 'full'

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          path: ${{ env.WORKSPACE_SRC_PATH }}        
      
      - name: Build and install
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cmd //c "${{ steps.sofa.outputs.vs_vsdevcmd }} \
              && cd /d $WORKSPACE_BUILD_PATH \
              && cmake \
                  -GNinja \
                  -DCMAKE_PREFIX_PATH="$SOFA_ROOT/lib/cmake" \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_INSTALL_PREFIX="$WORKSPACE_INSTALL_PATH" \
                  ../src \
              && ninja install"
          else
            cd "$WORKSPACE_BUILD_PATH"
            ccache -z
            cmake \
              -GNinja \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_PREFIX_PATH=$SOFA_ROOT/lib/cmake \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$WORKSPACE_INSTALL_PATH" \
              ../src
            ninja install
            echo ${CCACHE_BASEDIR}
            ccache -s
          fi
          
      - name: Sanitize artifact name
        id: sanitize
        # This step removes special characters from the artifact name to ensure compatibility with upload-artifact
        # Characters removed: " : < > | * ? \r \n \ /
        # Spaces are replaced with underscores
        # This sanitization prevents errors in artifact creation and retrieval
        shell: pwsh
        run: |
          $originalName = "InfinyToolkit_${{ steps.sofa.outputs.run_branch }}_for-SOFA-${{ steps.sofa.outputs.sofa_version }}_${{ runner.os }}"
          $artifact_name = $originalName -replace '[":;<>|*?\r\n\\/]', '' -replace ' ', '_'
          echo "artifact_name=$artifact_name" >> $env:GITHUB_OUTPUT
          
      - name: Create artifact
        id: create-artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: ${{ steps.sanitize.outputs.artifact_name }}
          path: ${{ env.WORKSPACE_INSTALL_PATH }}

      - name: Install artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: ${{ steps.sanitize.outputs.artifact_name }}
          path: ${{ env.WORKSPACE_ARTIFACT_PATH }}
      

      - name: Launch test 
        id: tests
        uses: sofa-framework/sofa-test-action@v1.0
        with:
          sofa_root: ${{ github.workspace }}/sofa
          sofa_version: ${{ steps.sofa.outputs.sofa_version }}
          src_dir: ${{ env.WORKSPACE_SRC_PATH }}
          build_dir: ${{ env.WORKSPACE_BUILD_PATH }}
          python_exe: ${{ steps.sofa.outputs.python_exe }}
          output_dir: ${{ github.workspace }}/tests-results_dir
          nb_parallel_threads: '4'

      - name: Inspect repository tree
        shell: bash
        run: |
          echo "Repository root:"
          ls -la .
          ls -la ${{ env.WORKSPACE_SRC_PATH }}

          if [ -z "$SOFA_ROOT" ]; then
              echo "SOFA_ROOT is not set"
          else
              echo "SOFA_ROOT=$SOFA_ROOT"
          fi

          if [ -z "$REGRESSION_DIR" ]; then
              echo "REGRESSION_DIR is not set"
          else
              echo "REGRESSION_DIR=$REGRESSION_DIR"
          fi

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "$BUILD_DIR/lib" >> $GITHUB_PATH
            echo "$BUILD_DIR/bin" >> $GITHUB_PATH
            
            pythonroot="$(dirname "${{ inputs.python_exe }}")"
            pythonroot=$(echo "$pythonroot" | tr '\\' '/' | sed 's/^\([A-Za-z]\):/\/\L\1/')
            echo "$pythonroot" >> $GITHUB_PATH
            echo "$pythonroot/DLLs" >> $GITHUB_PATH
            echo "$pythonroot/Lib" >> $GITHUB_PATH
            
            echo "$SOFA_ROOT/plugins/SofaPython3/bin" >> $GITHUB_PATH
          fi
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install tqdm

      - name: New regression tests
        shell: bash
        env:
          SOFA_ROOT: ${{ github.workspace }}/build
        run: |
          cd regression
          python SofaRegressionProgram.py \
              --input ${{ env.WORKSPACE_SRC_PATH }}/examples/ \
              --output ${{ env.WORKSPACE_SRC_PATH }}/regression/references/

  deploy:
    name: Deploy artifacts
    if: always() && startsWith(github.ref, 'refs/heads/main') # we are on a branch (not a PR)
    needs: [build-and-test]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Get artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          path: artifacts

      - name: Zip artifacts
        shell: bash
        run: |
          cd $GITHUB_WORKSPACE/artifacts
          for artifact in *; do
            zip $artifact.zip -r $artifact/*
          done
      - name: Upload release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          tag_name: release-${{ github.ref_name }}
          fail_on_unmatched_files: false
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/InfinyToolkit_*_Linux.zip
            artifacts/InfinyToolkit_*_Windows.zip
            artifacts/InfinyToolkit_*_macOS.zip

